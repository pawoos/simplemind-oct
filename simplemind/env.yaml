name: smcore
channels:
  - nvidia
  - pytorch
  - conda-forge

channel_priority: strict

dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - matplotlib=3.7.3
  - aiohttp
  - imageio
  - scikit-image
  - scikit-learn
  - simpleitk
  - pydicom
  - pytorch=2.3.0
  - torchvision=0.18.0
  - torchaudio=2.3.0
  - pytorch-cuda=11.8
  - timm
  - einops
  - gdown
  - monai
  - nibabel
  - pip:
      - smcore>=1.0.0
      - Connected-Components-3D
      - hydra-core
