env_name: medsam2
python_version: "3.11"
# python_version: "3.12"

# Optional: channels and conda/pip dependencies
channels:
  - pytorch
  - nvidia
  - conda-forge

conda_packages:
  - pytorch=2.5.1
  - torchvision=0.20.1
  - pytorch-cuda=11.8

pip_packages:
  - opencv-python
  - numpy
  - matplotlib
  - huggingface_hub
  - pillow>=10.4.0
  - smcore>=1.0.0
  - sympy==1.13.1

# Optional repo cloning + wrapper setup
repo:
  url: "https://github.com/bowang-lab/MedSAM2.git"
  dest: "../../../lib/MedSAM2"
  editable_install: true

