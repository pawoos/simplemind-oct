env_name: totalseg
python_version: "3.11"

use_gpu: true   # or false, or set via env var TOTALSEG_USE_GPU

channels:
  - pytorch
  - nvidia
  - conda-forge

conda_packages:
  # GPU or CPU variants will be appended automatically
  - pytorch>=2.1,<2.6
  - torchvision

pip_packages:
  - TotalSegmentator>=2.0.0
  - nibabel
  - SimpleITK
  - smcore>=1.0.0
